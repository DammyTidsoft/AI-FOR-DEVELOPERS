<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Circle Area Calculator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    /* Animated background circles */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .bg-circle {
      position: absolute;
      border-radius: 50%;
      opacity: 0.08;
      animation: float linear infinite;
    }
    .bg-circle:nth-child(1) { width: 400px; height: 400px; background: #7c3aed; top: -100px; left: -100px; animation-duration: 20s; }
    .bg-circle:nth-child(2) { width: 300px; height: 300px; background: #06b6d4; bottom: -80px; right: -80px; animation-duration: 25s; animation-direction: reverse; }
    .bg-circle:nth-child(3) { width: 200px; height: 200px; background: #10b981; top: 50%; left: 70%; animation-duration: 18s; }

    @keyframes float {
      0%   { transform: translate(0, 0) rotate(0deg); }
      33%  { transform: translate(30px, -30px) rotate(120deg); }
      66%  { transform: translate(-20px, 20px) rotate(240deg); }
      100% { transform: translate(0, 0) rotate(360deg); }
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 48px 40px;
      width: 420px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    }

    .icon-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }
    .icon-ring {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 3px solid transparent;
      background: linear-gradient(135deg, #7c3aed, #06b6d4) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: destination-out;
      mask-composite: exclude;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .icon-svg {
      width: 72px;
      height: 72px;
      position: absolute;
    }

    h1 {
      text-align: center;
      color: #fff;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }
    .subtitle {
      text-align: center;
      color: rgba(255,255,255,0.4);
      font-size: 0.85rem;
      margin-bottom: 36px;
    }

    label {
      display: block;
      color: rgba(255,255,255,0.6);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 24px;
    }
    .input-wrap input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 14px 50px 14px 18px;
      color: #fff;
      font-size: 1.1rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .input-wrap input:focus {
      border-color: #7c3aed;
      background: rgba(124, 58, 237, 0.08);
    }
    .input-wrap input::placeholder { color: rgba(255,255,255,0.2); }
    .input-unit {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.3);
      font-size: 0.85rem;
      font-weight: 600;
    }

    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    button:hover { opacity: 0.9; }
    button:active { transform: scale(0.98); }

    .result {
      margin-top: 28px;
      border-radius: 16px;
      overflow: hidden;
      display: none;
    }
    .result.show { display: block; }
    .result-inner {
      background: linear-gradient(135deg, rgba(124,58,237,0.15), rgba(6,182,212,0.15));
      border: 1px solid rgba(124,58,237,0.3);
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes popIn {
      from { transform: scale(0.85); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }
    .result-label {
      color: rgba(255,255,255,0.5);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }
    .result-value {
      font-size: 2.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #a78bfa, #22d3ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 6px;
    }
    .result-unit {
      color: rgba(255,255,255,0.35);
      font-size: 0.85rem;
    }

    .formula-note {
      text-align: center;
      color: rgba(255,255,255,0.2);
      font-size: 0.75rem;
      margin-top: 20px;
      font-style: italic;
    }

    .error {
      color: #f87171;
      font-size: 0.8rem;
      margin-top: 8px;
      display: none;
    }
    .error.show { display: block; }
  </style>
</head>
<body>
  <div class="bg">
    <div class="bg-circle"></div>
    <div class="bg-circle"></div>
    <div class="bg-circle"></div>
  </div>

  <div class="card">
    <div class="icon-wrap">
      <svg class="icon-svg" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="36" cy="36" r="28" stroke="url(#grad)" stroke-width="3" fill="rgba(124,58,237,0.1)"/>
        <circle cx="36" cy="36" r="2.5" fill="url(#grad)"/>
        <line x1="36" y1="36" x2="58" y2="36" stroke="url(#grad)" stroke-width="2" stroke-dasharray="3 2"/>
        <text x="44" y="32" fill="rgba(255,255,255,0.5)" font-size="7" font-family="sans-serif">r</text>
        <defs>
          <linearGradient id="grad" x1="0" y1="0" x2="72" y2="72" gradientUnits="userSpaceOnUse">
            <stop stop-color="#7c3aed"/>
            <stop offset="1" stop-color="#06b6d4"/>
          </linearGradient>
        </defs>
      </svg>
    </div>

    <h1>Circle Area Calculator</h1>
    <p class="subtitle">Enter a radius to compute the area</p>

    <label for="radius">Radius</label>
    <div class="input-wrap">
      <input type="number" id="radius" placeholder="e.g. 5.0" min="0" step="any" />
      <span class="input-unit">units</span>
    </div>
    <div class="error" id="error">⚠ Please enter a valid positive number.</div>

    <button onclick="calculate()">Calculate Area</button>

    <div class="result" id="result">
      <div class="result-inner">
        <div class="result-label">Area of Circle</div>
        <div class="result-value" id="area-value">—</div>
        <div class="result-unit">square units</div>
      </div>
    </div>

    <p class="formula-note">Formula: A = π × r²  &nbsp;(π ≈ 3.14)</p>
  </div>

  <script>
    const input = document.getElementById('radius');

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') calculate();
    });

    function calculate() {
      const r = parseFloat(input.value);
      const errorEl = document.getElementById('error');
      const resultEl = document.getElementById('result');
      const areaEl = document.getElementById('area-value');

      if (isNaN(r) || r <= 0) {
        errorEl.classList.add('show');
        resultEl.classList.remove('show');
        return;
      }

      errorEl.classList.remove('show');

      // C++ logic: area = 3.14 * r * r
      const area = 3.14 * r * r;
      areaEl.textContent = Number.isInteger(area) ? area.toString() : area.toFixed(4);

      // Re-trigger animation
      resultEl.classList.remove('show');
      void resultEl.offsetWidth;
      resultEl.classList.add('show');
    }
  </script>
</body>
</html>
