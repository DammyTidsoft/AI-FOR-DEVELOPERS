<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROCKET BOOSTER</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --fire: #ff4500;
    --fire2: #ff8c00;
    --glow: #00ffcc;
    --deep: #020818;
    --panel: rgba(0,255,204,0.07);
    --border: rgba(0,255,204,0.25);
    --text: #c8fff4;
    --danger: #ff2d55;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--deep);
    font-family: 'Share Tech Mono', monospace;
    color: var(--text);
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  #gameWrapper {
    position: relative;
    width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  #header {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-bottom: none;
  }

  #header h1 {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 18px;
    letter-spacing: 4px;
    color: var(--glow);
    text-shadow: 0 0 20px var(--glow), 0 0 40px rgba(0,255,204,0.3);
  }

  .stat {
    text-align: right;
    font-size: 11px;
    line-height: 1.6;
  }

  .stat span {
    color: var(--glow);
    font-size: 16px;
    font-family: 'Orbitron', sans-serif;
  }

  #canvas {
    display: block;
    border: 1px solid var(--border);
    box-shadow: 0 0 40px rgba(0,255,204,0.08), inset 0 0 80px rgba(0,10,30,0.9);
    cursor: none;
  }

  #footer {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-top: none;
    font-size: 11px;
    color: rgba(200,255,244,0.5);
  }

  .fuel-bar-wrap {
    width: 100%;
    height: 6px;
    background: rgba(0,255,204,0.1);
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  #fuelBar {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, var(--glow), #00e5ff);
    box-shadow: 0 0 10px var(--glow);
    transition: width 0.1s, background 0.3s;
  }

  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0;
    bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(2,8,24,0.92);
    z-index: 10;
    gap: 16px;
    pointer-events: none;
  }

  #overlay.hidden { display: none; }

  #overlay h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 6px;
    color: var(--glow);
    text-shadow: 0 0 30px var(--glow);
  }

  #overlay .sub {
    font-size: 12px;
    letter-spacing: 2px;
    color: rgba(200,255,244,0.6);
    text-align: center;
    line-height: 2;
  }

  #overlay .score-display {
    font-family: 'Orbitron', sans-serif;
    font-size: 42px;
    font-weight: 900;
    color: var(--fire2);
    text-shadow: 0 0 30px var(--fire2);
  }

  #startBtn {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    letter-spacing: 3px;
    padding: 12px 36px;
    background: transparent;
    border: 1px solid var(--glow);
    color: var(--glow);
    cursor: pointer;
    pointer-events: all;
    text-transform: uppercase;
    transition: all 0.2s;
    box-shadow: 0 0 20px rgba(0,255,204,0.15);
  }

  #startBtn:hover {
    background: rgba(0,255,204,0.1);
    box-shadow: 0 0 30px rgba(0,255,204,0.3);
    transform: scale(1.03);
  }

  #overlay .hint {
    font-size: 10px;
    color: rgba(200,255,244,0.35);
    letter-spacing: 2px;
  }
</style>
</head>
<body>

<div id="gameWrapper">
  <div id="header">
    <h1>ROCKET BOOSTER</h1>
    <div class="stat">
      SCORE<br><span id="scoreDisplay">0</span>
    </div>
  </div>

  <div class="fuel-bar-wrap">
    <div id="fuelBar"></div>
  </div>

  <div style="position:relative;">
    <canvas id="canvas" width="420" height="560"></canvas>
    <div id="overlay">
      <h2>ROCKET BOOSTER</h2>
      <div class="sub">Navigate through asteroid fields<br>Collect fuel canisters · Survive</div>
      <div id="finalScore" class="score-display" style="display:none;"></div>
      <button id="startBtn">LAUNCH</button>
      <div class="hint">HOLD SPACE / CLICK · TILT TO STEER</div>
    </div>
  </div>

  <div id="footer">
    <span>HOLD SPACE/CLICK → THRUST</span>
    <span>← → ARROWS / TILT STEER</span>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// --- State ---
let state = 'menu'; // menu | playing | dead
let score = 0, bestScore = 0, frame = 0;
let fuel = 100;
let thrusting = false;
let tiltX = 0;

// --- Rocket ---
const rocket = { x: W/2, y: H - 100, vx: 0, vy: 0, angle: 0, trail: [] };

// --- Scrolling speed ---
let speed = 1.2;

// --- Obstacles ---
let asteroids = [];
let fuelCans = [];
let stars = [];
let particles = [];
let boostParticles = [];

// --- Init stars ---
function initStars() {
  stars = [];
  for (let i = 0; i < 120; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.5 + 0.2,
      spd: Math.random() * 0.4 + 0.1,
      alpha: Math.random() * 0.7 + 0.3
    });
  }
}

function spawnAsteroid() {
  const r = Math.random() * 22 + 10;
  const x = Math.random() * (W - r*2) + r;
  const numPoints = Math.floor(Math.random() * 4) + 6;
  const pts = [];
  for (let i = 0; i < numPoints; i++) {
    const angle = (i / numPoints) * Math.PI * 2;
    const rad = r * (0.7 + Math.random() * 0.5);
    pts.push({ x: Math.cos(angle) * rad, y: Math.sin(angle) * rad });
  }
  asteroids.push({ x, y: -r - 10, r, pts, rot: Math.random() * Math.PI * 2, rotSpd: (Math.random() - 0.5) * 0.03 });
}

function spawnFuelCan() {
  const x = Math.random() * (W - 40) + 20;
  fuelCans.push({ x, y: -20, w: 14, h: 22, pulse: 0 });
}

function resetGame() {
  score = 0;
  fuel = 100;
  speed = 1.2;
  frame = 0;
  asteroids = [];
  fuelCans = [];
  particles = [];
  boostParticles = [];
  rocket.x = W / 2;
  rocket.y = H - 100;
  rocket.vx = 0;
  rocket.vy = 0;
  rocket.angle = 0;
  rocket.trail = [];
  initStars();
}

// --- Input ---
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') { e.preventDefault(); if (state === 'menu' || state === 'dead') startGame(); }
});
window.addEventListener('keyup', e => keys[e.code] = false);

canvas.addEventListener('mousedown', () => { if (state === 'playing') thrusting = true; else startGame(); });
canvas.addEventListener('mouseup', () => thrusting = false);
canvas.addEventListener('touchstart', e => { e.preventDefault(); if (state === 'playing') thrusting = true; else startGame(); }, { passive: false });
canvas.addEventListener('touchend', e => { e.preventDefault(); thrusting = false; }, { passive: false });

// Tilt (mobile)
window.addEventListener('deviceorientation', e => {
  if (e.gamma !== null) tiltX = Math.max(-1, Math.min(1, e.gamma / 30));
});

document.getElementById('startBtn').addEventListener('click', startGame);

function startGame() {
  resetGame();
  state = 'playing';
  document.getElementById('overlay').classList.add('hidden');
}

// --- Collision ---
function circleRect(cx, cy, cr, rx, ry, rw, rh) {
  const nearX = Math.max(rx, Math.min(cx, rx + rw));
  const nearY = Math.max(ry, Math.min(cy, ry + rh));
  const dx = cx - nearX, dy = cy - nearY;
  return dx*dx + dy*dy < cr*cr;
}

function pointInPoly(px, py, pts, ox, oy) {
  let inside = false;
  for (let i = 0, j = pts.length - 1; i < pts.length; j = i++) {
    const xi = pts[i].x + ox, yi = pts[i].y + oy;
    const xj = pts[j].x + ox, yj = pts[j].y + oy;
    if (((yi > py) !== (yj > py)) && (px < (xj - xi) * (py - yi) / (yj - yi) + xi)) inside = !inside;
  }
  return inside;
}

function spawnExplosion(x, y) {
  for (let i = 0; i < 28; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = Math.random() * 4 + 1;
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: 1,
      r: Math.random() * 4 + 1,
      color: Math.random() < 0.5 ? '#ff4500' : '#ff8c00'
    });
  }
}

// --- Draw helpers ---
function drawRocket(x, y, angle, thrust) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);

  // Body
  ctx.beginPath();
  ctx.moveTo(0, -22);
  ctx.lineTo(8, 10);
  ctx.lineTo(5, 14);
  ctx.lineTo(-5, 14);
  ctx.lineTo(-8, 10);
  ctx.closePath();
  ctx.fillStyle = '#b8d4e8';
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,255,204,0.4)';
  ctx.lineWidth = 0.8;
  ctx.stroke();

  // Nose
  ctx.beginPath();
  ctx.moveTo(0, -22);
  ctx.lineTo(4, -8);
  ctx.lineTo(-4, -8);
  ctx.closePath();
  ctx.fillStyle = '#ff4500';
  ctx.fill();

  // Window
  ctx.beginPath();
  ctx.arc(0, -2, 4, 0, Math.PI * 2);
  ctx.fillStyle = '#00ffcc';
  ctx.globalAlpha = 0.8;
  ctx.fill();
  ctx.globalAlpha = 1;

  // Wings
  ctx.beginPath();
  ctx.moveTo(-8, 10);
  ctx.lineTo(-16, 18);
  ctx.lineTo(-5, 14);
  ctx.closePath();
  ctx.fillStyle = '#7090b0';
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(8, 10);
  ctx.lineTo(16, 18);
  ctx.lineTo(5, 14);
  ctx.closePath();
  ctx.fillStyle = '#7090b0';
  ctx.fill();

  // Thruster flame
  if (thrust) {
    const flameH = 12 + Math.random() * 10;
    const grad = ctx.createLinearGradient(0, 14, 0, 14 + flameH);
    grad.addColorStop(0, 'rgba(255,140,0,0.9)');
    grad.addColorStop(0.5, 'rgba(255,69,0,0.7)');
    grad.addColorStop(1, 'rgba(255,0,0,0)');
    ctx.beginPath();
    ctx.moveTo(-4, 14);
    ctx.quadraticCurveTo(0, 14 + flameH * 0.6, 0, 14 + flameH);
    ctx.quadraticCurveTo(0, 14 + flameH * 0.6, 4, 14);
    ctx.fillStyle = grad;
    ctx.fill();
  }

  ctx.restore();
}

function drawAsteroid(a) {
  ctx.save();
  ctx.translate(a.x, a.y);
  ctx.rotate(a.rot);
  ctx.beginPath();
  ctx.moveTo(a.pts[0].x, a.pts[0].y);
  for (let i = 1; i < a.pts.length; i++) ctx.lineTo(a.pts[i].x, a.pts[i].y);
  ctx.closePath();
  ctx.fillStyle = '#2a3040';
  ctx.fill();
  ctx.strokeStyle = 'rgba(150,170,200,0.4)';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.restore();
}

function drawFuelCan(f) {
  f.pulse = (f.pulse + 0.08) % (Math.PI * 2);
  const glow = 0.5 + Math.sin(f.pulse) * 0.3;
  ctx.save();
  ctx.translate(f.x, f.y);
  // Glow
  ctx.shadowColor = '#00ffcc';
  ctx.shadowBlur = 15 * glow;
  // Can body
  ctx.fillStyle = `rgba(0,255,204,${0.7 + glow * 0.2})`;
  ctx.fillRect(-f.w/2, -f.h/2, f.w, f.h);
  // Label
  ctx.fillStyle = 'rgba(2,8,24,0.8)';
  ctx.fillRect(-f.w/2 + 2, -3, f.w - 4, 6);
  ctx.fillStyle = '#00ffcc';
  ctx.font = 'bold 7px Share Tech Mono';
  ctx.textAlign = 'center';
  ctx.fillText('FUEL', 0, 2);
  ctx.shadowBlur = 0;
  ctx.restore();
}

// --- Main loop ---
function update() {
  if (state !== 'playing') return;

  frame++;
  score += 0.05;
  speed = 1.2 + score * 0.003;
  if (speed > 6) speed = 6;

  // Controls
  const left = keys['ArrowLeft'] || keys['KeyA'];
  const right = keys['ArrowRight'] || keys['KeyD'];
  const thrust = keys['Space'] || thrusting;

  // Steering
  let steer = 0;
  if (left) steer -= 1;
  if (right) steer += 1;
  steer += tiltX * 1.5;

  rocket.vx += steer * 0.18;
  rocket.vx *= 0.88;
  rocket.angle = rocket.vx * 0.18;

  if (thrust && fuel > 0) {
    rocket.vy -= 0.35;
    fuel = Math.max(0, fuel - 0.25);
    // Boost particles
    for (let i = 0; i < 2; i++) {
      boostParticles.push({
        x: rocket.x + (Math.random() - 0.5) * 6,
        y: rocket.y + 16,
        vx: (Math.random() - 0.5) * 1.5,
        vy: Math.random() * 2 + 1,
        life: 1,
        r: Math.random() * 3 + 1
      });
    }
  }

  rocket.vy += 0.15; // gravity
  rocket.vy = Math.min(rocket.vy, 5);
  rocket.x += rocket.vx;
  rocket.y += rocket.vy;

  // Trail
  rocket.trail.push({ x: rocket.x, y: rocket.y });
  if (rocket.trail.length > 18) rocket.trail.shift();

  // Bounds
  if (rocket.x < 10) { rocket.x = 10; rocket.vx *= -0.5; }
  if (rocket.x > W - 10) { rocket.x = W - 10; rocket.vx *= -0.5; }
  if (rocket.y > H + 40) die();
  if (rocket.y < 10) rocket.vy = Math.abs(rocket.vy) * 0.5;

  // Stars
  stars.forEach(s => {
    s.y += s.spd * speed * 0.3;
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
  });

  // Spawn
  if (frame % Math.max(28, Math.floor(90 - score * 0.5)) === 0) spawnAsteroid();
  if (frame % 180 === 0) spawnFuelCan();

  // Asteroids
  for (let i = asteroids.length - 1; i >= 0; i--) {
    const a = asteroids[i];
    a.y += speed;
    a.rot += a.rotSpd;
    if (a.y > H + 50) { asteroids.splice(i, 1); continue; }
    // Collision: check if rocket center near asteroid
    const dx = rocket.x - a.x, dy = rocket.y - a.y;
    if (dx*dx + dy*dy < (a.r + 10) * (a.r + 10)) {
      die(); return;
    }
  }

  // Fuel cans
  for (let i = fuelCans.length - 1; i >= 0; i--) {
    const f = fuelCans[i];
    f.y += speed;
    if (f.y > H + 40) { fuelCans.splice(i, 1); continue; }
    if (circleRect(rocket.x, rocket.y, 12, f.x - f.w/2, f.y - f.h/2, f.w, f.h)) {
      fuel = Math.min(100, fuel + 25);
      spawnExplosion(f.x, f.y);
      fuelCans.splice(i, 1);
    }
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.1;
    p.life -= 0.025;
    if (p.life <= 0) { particles.splice(i, 1); }
  }

  for (let i = boostParticles.length - 1; i >= 0; i--) {
    const p = boostParticles[i];
    p.x += p.vx; p.y += p.vy;
    p.life -= 0.06;
    if (p.life <= 0) { boostParticles.splice(i, 1); }
  }

  // Fuel drain
  fuel = Math.max(0, fuel - 0.012);
  if (fuel <= 0 && rocket.vy > 4) die();

  // UI
  document.getElementById('scoreDisplay').textContent = Math.floor(score);
  const pct = fuel / 100;
  const bar = document.getElementById('fuelBar');
  bar.style.width = (pct * 100) + '%';
  bar.style.background = pct > 0.3
    ? 'linear-gradient(90deg, #00ffcc, #00e5ff)'
    : pct > 0.15
    ? 'linear-gradient(90deg, #ff8c00, #ffd700)'
    : 'linear-gradient(90deg, #ff2d55, #ff4500)';
  bar.style.boxShadow = `0 0 10px ${pct > 0.3 ? '#00ffcc' : pct > 0.15 ? '#ff8c00' : '#ff2d55'}`;
}

function die() {
  state = 'dead';
  spawnExplosion(rocket.x, rocket.y);
  spawnExplosion(rocket.x, rocket.y);
  const finalScore = Math.floor(score);
  if (finalScore > bestScore) bestScore = finalScore;
  const overlay = document.getElementById('overlay');
  overlay.classList.remove('hidden');
  overlay.querySelector('h2').textContent = 'DESTROYED';
  overlay.querySelector('.sub').innerHTML = `SCORE: <b style="color:var(--fire2)">${finalScore}</b> &nbsp;|&nbsp; BEST: <b style="color:var(--glow)">${bestScore}</b>`;
  document.getElementById('finalScore').style.display = 'none';
  document.getElementById('startBtn').textContent = 'RELAUNCH';
}

function draw() {
  // Background
  ctx.fillStyle = '#020818';
  ctx.fillRect(0, 0, W, H);

  // Stars
  stars.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(180,220,255,${s.alpha})`;
    ctx.fill();
  });

  if (state === 'playing' || state === 'dead') {
    // Rocket trail
    for (let i = 0; i < rocket.trail.length; i++) {
      const t = rocket.trail[i];
      const alpha = (i / rocket.trail.length) * 0.35;
      ctx.beginPath();
      ctx.arc(t.x, t.y, 3 * (i / rocket.trail.length), 0, Math.PI * 2);
      ctx.fillStyle = `rgba(0,255,204,${alpha})`;
      ctx.fill();
    }

    // Boost particles
    boostParticles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
      const c = p.life > 0.5 ? '#ff8c00' : '#ff4500';
      ctx.fillStyle = c;
      ctx.globalAlpha = p.life * 0.8;
      ctx.fill();
      ctx.globalAlpha = 1;
    });

    // Fuel cans
    fuelCans.forEach(drawFuelCan);

    // Asteroids
    asteroids.forEach(drawAsteroid);

    // Explosion particles
    particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.life;
      ctx.fill();
      ctx.globalAlpha = 1;
    });

    // Rocket
    if (state === 'playing') {
      const thrust = keys['Space'] || thrusting;
      drawRocket(rocket.x, rocket.y, rocket.angle, thrust);
    }

    // Scanline subtle effect
    for (let y = 0; y < H; y += 4) {
      ctx.fillStyle = 'rgba(0,0,0,0.06)';
      ctx.fillRect(0, y, W, 2);
    }
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

initStars();
loop();
</script>
</body>
</html>
